<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego Cazando | Pro Edition</title>
  <link href="cazando.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body onload="iniciarJuego()">

  <div class="main-container">
    <header>
      <h1>JUEGO CAZANDO</h1>
      <div class="author-container">
        <span class="author">By Paul Veloz</span>
      </div>

    </header>

    <div class="panel stats-bar">
      <div class="stat-item">
        <label>Puntos</label>
        <span id="puntos">0</span>
      </div>
      <div class="stat-item">
        <label>Tiempo</label>
        <span id="tiempo">10</span>
      </div>
    </div>

    <div class="game-wrapper">
      <canvas id="areaDeJuego" width="500" height="500"></canvas>
      <p id="mensaje"></p>
    </div>

    <div class="controls-section">
      <div class="d-pad">
        <button class="btn-control up" onclick="moverArriba()">▲</button>
        <div class="horizontal-btns">
          <button class="btn-control left" onclick="moverIzquierda()">◀</button>
          <button class="btn-control down" onclick="moverAbajo()">▼</button>
          <button class="btn-control right" onclick="moverDerecha()">▶</button>
        </div>
      </div>
      
      <div class="action-zone">
        <button id="btn-reiniciar" class="btn-primary" onclick="reiniciarJuego()">REINICIAR</button>
      </div>
    </div>
  </div>

  <script src="utils.js"></script>
  <script src="cazando.js"></script>
</body>
</html>
